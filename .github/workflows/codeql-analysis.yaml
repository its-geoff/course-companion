name: CodeQL Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'linux'
          target: 'desktop'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y uuid-dev build-essential python3-pip
          pip install conan --break-system-packages
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conan.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install Conan dependencies
        run: |
          mkdir -p build/build_main
          conan install . --lockfile=conan.lock --build=missing -of build/build_main -s build_type=Debug

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Build code
        run: |
          cmake -S . -B build/build_main \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/build_main/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"
          cmake --build build/build_main -- -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "security-and-quality"