name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize ]

  push:
    branches: [ main, develop ]
    tags:
      - 'v*'

  workflow_dispatch:
  
  schedule:
    - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: course_companion_test
        ports:
          - 3306:3306
          - 33060:33060
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'linux'
          target: 'desktop'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y uuid-dev build-essential python3-pip
          pip install conan --break-system-packages
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v3
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conan.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install Conan dependencies
        run: |
          mkdir -p build/build_test
          conan install . --lockfile=conan.lock --build=missing -of build/build_test -s build_type=Debug

      - name: Configure CMake (Test)
        run: |
          cmake -S . -B build/build_test \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_TOOLCHAIN_FILE=build/build_test/conan_toolchain.cmake \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      - name: Build tests
        run: cmake --build build/build_test

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 33060
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          TEST_DB_SCHEMA: course_companion_test
        run: ctest --test-dir build/build_test --output-on-failure

  docker:
    needs: [ test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: github.ref_type == 'tag' && github.ref_name != ''
    needs: [ docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: elgohr/Github-Release-Action@v5
        with:
          title: Release ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          body: |
            This release is distributed via Docker images published to GitHub Container Registry (GHCR).
            
            Pull the image for this release using:
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
            
            For additional tags and images, see: https://ghcr.io/${{ github.repository }}